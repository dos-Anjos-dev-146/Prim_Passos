<!DOCTYPE html>
<html lang="pt.br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>!important</title>
</head>
<body>
    <h1> "!important" é utilizado
        para fixar um comando e
        ignorar a "cascata CSS"
    </h1>
    
</body>

<style>
    h1 {
        color: blueviolet !important;
        color: magenta;
    }
</style>
</html>
