<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo_Elemento</title>
</head>
<body>
    
<a href="https://emojikeyboard.top/pt/#emojis-1">CLIQUE AQUI</a>

<br>
<br>

<input placeholder="DIGITE AQUI"></input>

</body>

<style>

* {
    margin: 50px;
    padding: 50px;
    box-sizing: border-box;
}

a::before {
    content: "👶🏻​🫵🏻​​";
}

a::after {
    content: "🫥​​🥩​";
}

a {
    color: blue;
}

input::placeholder {
    background-color: #000000;
    color: #ffffff;
}
</style>
</html>
